    <div class="bg-vignette"></div>

    <!-- Drifting orbs -->
    <div
      class="orb"
      style="
        width: 180px;
        height: 180px;
        top: 8%;
        left: 5%;
        animation-duration: 12s;
        opacity: 0.5;
      "
    ></div>
    <div
      class="orb"
      style="
        width: 120px;
        height: 120px;
        top: 60%;
        left: 2%;
        animation-duration: 9s;
        animation-delay: -3s;
        opacity: 0.35;
      "
    ></div>
    <div
      class="orb"
      style="
        width: 200px;
        height: 200px;
        top: 10%;
        right: 4%;
        animation-duration: 14s;
        animation-delay: -5s;
        opacity: 0.4;
      "
    ></div>
    <div
      class="orb"
      style="
        width: 100px;
        height: 100px;
        bottom: 12%;
        right: 8%;
        animation-duration: 11s;
        animation-delay: -7s;
        opacity: 0.3;
      "
    ></div>
    <div
      class="orb"
      style="
        width: 90px;
        height: 90px;
        bottom: 18%;
        left: 14%;
        animation-duration: 10s;
        animation-delay: -2s;
        opacity: 0.3;
      "
    ></div>

    <div class="container">
      <h2>Login</h2>

      <input type="email" id="email" placeholder="Email" />
      <input type="password" id="password" placeholder="Password" />

      <button onclick="login()">Login</button>

      <div class="link">
        <a href="register.html">Create account</a>
      </div>
    </div>
